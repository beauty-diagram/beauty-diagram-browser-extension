<!doctype html>
<html><head><meta charset="utf-8"><title>Beauty Diagram</title>
<style>
body{font-family:system-ui;width:240px;padding:.75rem 1rem;margin:0}
h2{font-size:.95rem;margin:0 0 .75rem}
label{display:flex;align-items:center;gap:.4rem;margin:.5rem 0;font-size:.875rem;cursor:pointer}
label.row{flex-direction:row}
label.col{flex-direction:column;align-items:flex-start;gap:.2rem}
select{width:100%;padding:.25rem .3rem;font-size:.85rem}
.footer{margin-top:.75rem;padding-top:.5rem;border-top:1px solid #e5e7eb;font-size:.8rem}
a{color:#2563eb;cursor:pointer;text-decoration:none}
a:hover{text-decoration:underline}
</style>
</head><body>
<h2>Beauty Diagram</h2>
<label class="row"><input id="siteEnabled" type="checkbox" /> Beautify on this site</label>
<label class="row"><input id="replaceRendered" type="checkbox" /> Replace already-rendered diagrams</label>
<label class="col">Default theme<select id="defaultTheme"></select></label>
<div class="footer"><a id="openOptions">More settings…</a></div>
<script src="dist/popup.js"></script>
</body></html>
