<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Beauty Diagram</title>
<style>
  :root {
    --violet: #7c3aed;
    --violet-wash: #f5f3ff;
    --violet-text: #6d28d9;
    --ink: #171717;
    --muted: #6b7280;
    --line: rgba(17,17,17,.08);
    --surface: #ffffff;
    --bg: #ffffff;
    --seg-bg: #f3f4f6;
    --track-off: #d4d4d8;
    --shadow-card: 0 0 0 1px rgba(17,17,17,.05), 0 2px 4px rgba(17,17,17,.05);
    --shadow-knob: 0 1px 2px rgba(17,17,17,.25);
    --logo-ink: #171717;
    --logo-violet: #7c3aed;
    --logo-dot: #ffffff;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --violet: #a78bfa;
      --violet-wash: rgba(139,92,246,.16);
      --violet-text: #c4b5fd;
      --ink: #f4f4f5;
      --muted: #9b9ba4;
      --line: rgba(255,255,255,.10);
      --surface: #26262b;
      --bg: #1d1d20;
      --seg-bg: rgba(255,255,255,.06);
      --track-off: rgba(255,255,255,.20);
      --shadow-card: 0 0 0 1px rgba(255,255,255,.07), 0 2px 6px rgba(0,0,0,.4);
      --shadow-knob: 0 1px 2px rgba(0,0,0,.5);
      --logo-ink: #e4e4e7;
      --logo-violet: #a78bfa;
      --logo-dot: #1d1d20;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    width: 288px;
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.4;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }
  .wrap { animation: rise .22s cubic-bezier(.2,.7,.3,1) both; }
  @keyframes rise { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }

  header {
    display: flex; align-items: center; gap: .55rem;
    padding: 15px 16px 13px;
    background: linear-gradient(180deg, var(--violet-wash), transparent);
    border-bottom: 1px solid var(--line);
  }
  header svg.mark { width: 22px; height: 22px; display: block; flex: none; }
  header .name { font-weight: 600; font-size: 14.5px; letter-spacing: -.012em; }

  .body { padding: 13px 16px 15px; display: flex; flex-direction: column; gap: 16px; }
  .group { display: flex; flex-direction: column; gap: 10px; animation: rise .3s ease both; }
  .group:nth-of-type(2) { animation-delay: .05s; }
  .label { font-size: 10px; font-weight: 600; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); }
  .flabel { font-size: 11.5px; font-weight: 500; color: var(--muted); }

  .row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 0; cursor: pointer; }
  .row .txt { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
  .row .t1 { font-size: 13px; font-weight: 500; }
  .row .t2 { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row.off { cursor: default; }
  .row.off .t1, .row.off .t2 { opacity: .45; }

  .switch { position: relative; flex: none; width: 34px; height: 20px; }
  .switch input { position: absolute; inset: 0; margin: 0; opacity: 0; cursor: pointer; }
  .track { position: absolute; inset: 0; border-radius: 999px; background: var(--track-off); transition: background .18s ease; }
  .track::after { content: ""; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: #fff; box-shadow: var(--shadow-knob); transition: transform .2s cubic-bezier(.3,.85,.3,1); }
  .switch input:checked + .track { background: var(--violet); }
  .switch input:checked + .track::after { transform: translateX(14px); }
  .switch input:focus-visible + .track { box-shadow: 0 0 0 3px rgba(124,58,237,.28); }
  .switch input:disabled { cursor: default; }
  .switch input:disabled + .track { opacity: .4; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .selectwrap { position: relative; }
  select { -webkit-appearance: none; appearance: none; width: 100%; font: inherit; font-size: 13px; color: var(--ink); background: var(--surface); border: 0; box-shadow: 0 0 0 1px var(--line); border-radius: 10px; padding: 8px 30px 8px 11px; cursor: pointer; transition: box-shadow .15s ease; }
  select:hover { box-shadow: 0 0 0 1px rgba(124,58,237,.32); }
  select:focus-visible { outline: 0; box-shadow: 0 0 0 1px var(--violet), 0 0 0 3px rgba(124,58,237,.18); }
  .chev { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--muted); }

  .seg { display: flex; gap: 2px; padding: 3px; background: var(--seg-bg); border-radius: 10px; }
  .seg button { flex: 1; font: inherit; font-size: 12px; font-weight: 500; color: var(--muted); background: transparent; border: 0; border-radius: 7px; padding: 5px 0; cursor: pointer; transition: color .15s ease, background .15s ease, box-shadow .15s ease; }
  .seg button:hover { color: var(--ink); }
  .seg button[aria-pressed="true"] { background: var(--surface); color: var(--violet-text); box-shadow: var(--shadow-card); }

  footer { border-top: 1px solid var(--line); padding: 11px 16px; }
  .more { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; color: var(--violet-text); cursor: pointer; text-decoration: none; }
  .more svg { transition: transform .15s ease; }
  .more:hover svg { transform: translateX(3px); }
</style>
</head>
<body><div class="wrap">
  <header>
    <svg class="mark" viewBox="0 0 64 64" aria-hidden="true">
      <path d="M20 20 L44 44" stroke="var(--logo-violet)" stroke-width="3" stroke-linecap="round" fill="none"/>
      <rect x="8" y="8" width="22" height="22" rx="7" fill="var(--logo-ink)"/>
      <rect x="34" y="34" width="22" height="22" rx="7" fill="none" stroke="var(--logo-violet)" stroke-width="3"/>
      <circle cx="16" cy="16" r="3" fill="var(--logo-dot)"/>
    </svg>
    <span class="name">Beauty Diagram</span>
  </header>

  <div class="body">
    <div class="group">
      <span class="label">This site</span>
      <label class="row" id="siteRow">
        <span class="txt"><span class="t1">Beautify on this site</span><span class="t2" id="siteHost">—</span></span>
        <span class="switch"><input type="checkbox" id="siteEnabled"><span class="track"></span></span>
      </label>
    </div>

    <div class="group">
      <span class="label">Rendering</span>
      <label class="row">
        <span class="txt"><span class="t1">Replace rendered diagrams</span><span class="t2">GitHub / GitLab native renders</span></span>
        <span class="switch"><input type="checkbox" id="replaceRendered"><span class="track"></span></span>
      </label>

      <div class="field">
        <span class="flabel">Theme</span>
        <div class="selectwrap">
          <select id="defaultTheme"></select>
          <svg class="chev" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
        </div>
      </div>

      <div class="field">
        <span class="flabel">Max width</span>
        <div class="seg" id="widthSeg">
          <button type="button" data-width="full" aria-pressed="true">Full</button>
          <button type="button" data-width="800px" aria-pressed="false">800</button>
          <button type="button" data-width="640px" aria-pressed="false">640</button>
          <button type="button" data-width="480px" aria-pressed="false">480</button>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <a class="more" id="openOptions">More settings
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </a>
  </footer>
</div>
<script src="dist/popup.js"></script>
</body></html>
