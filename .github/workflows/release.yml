name: Release
on:
  # Version-shaped tags only (no `v` prefix — matches `npm version`'s 0.1.0 tags,
  # consistent with the sibling plugin repos). Excludes junk tags like `tmp-test`.
  push: { tags: ['[0-9]*.[0-9]*.[0-9]*'] }
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run typecheck && npm test && npm run build
      - run: node scripts/zip.mjs
      # Chrome Web Store upload is intentionally NOT automated: we submit the
      # package by hand via the Developer Dashboard so the store listing (video,
      # screenshots) can be updated in the same review. A version tag still
      # builds, tests, and attaches a ready-to-upload zip to the GitHub Release.
      - name: GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes beauty-diagram-browser-extension.zip
